<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Radar - Twój osobisty asystent rynku pracy z AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
</head>
<body class="bg-gray-100 min-h-screen font-sans text-gray-800">

    <div class="max-w-5xl mx-auto py-10 px-4">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-bold text-blue-600 mb-2">Radar Rynku Pracy AI</h1>
            <p class="text-gray-500">Błyskawiczna analiza ofert i ocena dopasowania Twojego CV</p>
        </header>

        <div class="bg-white p-6 rounded-lg shadow-md mb-8">
            <form id="searchForm" class="flex flex-col gap-4">
                <div class="flex flex-col md:flex-row gap-4">
                    <div class="flex-1">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Technologia</label>
                        <select id="category" class="w-full border border-gray-300 rounded-md p-2 focus:ring-blue-500 focus:border-blue-500">
                            <option value="python" selected>Python</option>
                            <option value="data">Data</option>
                            <option value="java">Java</option>
                            <option value="javascript">JavaScript</option>
                        </select>
                    </div>
                    <div class="flex-1">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Lokalizacja</label>
                        <select id="location" class="w-full border border-gray-300 rounded-md p-2 focus:ring-blue-500 focus:border-blue-500">
                            <option value="lodz" selected>Łódź</option>
                            <option value="warszawa">Warszawa</option>
                            <option value="krakow">Kraków</option>
                            <option value="wroclaw">Wrocław</option>
                        </select>
                    </div>
                    <div class="flex-1">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Doświadczenie</label>
                        <select id="experience" class="w-full border border-gray-300 rounded-md p-2 focus:ring-blue-500 focus:border-blue-500">
                            <option value="junior" selected>Junior</option>
                            <option value="mid">Mid</option>
                            <option value="senior">Senior</option>
                        </select>
                    </div>
                </div>

                <div class="mt-2 p-4 bg-blue-50 border border-blue-100 rounded-md">
                    <label class="block text-sm font-semibold text-blue-800 mb-2">
                        <i class="fas fa-robot mr-1"></i> (Opcjonalnie) Wgraj swoje CV w PDF, aby system ocenił dopasowanie:
                    </label>
                    <input type="file" id="cv_file" accept=".pdf"
                           class="block w-full text-sm text-gray-500
                                  file:mr-4 file:py-2 file:px-4
                                  file:rounded-md file:border-0
                                  file:text-sm file:font-semibold
                                  file:bg-blue-600 file:text-white
                                  hover:file:bg-blue-700 transition cursor-pointer">
                </div>

                <div class="flex justify-end mt-2">
                    <button type="submit" id="submitBtn" class="w-full md:w-auto bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-8 rounded-md transition duration-200 shadow-md">
                        <i class="fas fa-search mr-2"></i>Szukaj i Analizuj
                    </button>
                </div>
            </form>
        </div>

        <div id="loadingIndicator" class="hidden text-center my-8">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
            <p class="mt-2 text-gray-500 font-medium">Skanowanie rynku i analiza semantyczna wektorów... To może potrwać kilka sekund.</p>
        </div>

        <div id="resultsContainer" class="hidden">
            <h2 class="text-2xl font-semibold mb-4 text-gray-700">Top Wyniki <span id="resultsCount" class="text-sm font-normal text-gray-500"></span></h2>
            <div id="cardsWrapper" class="flex flex-col gap-4">
                </div>
        </div>
    </div>

    <script>
        // 1. NOWA FUNKCJA: Pobieranie odwiedzonych ofert z dysku przeglądarki
        function getVisitedJobs() {
            return JSON.parse(localStorage.getItem('visited_jobs') || '[]');
        }

        // 2. NOWA FUNKCJA: Zapisywanie klikniętej oferty i zmiana jej wyglądu w locie
        window.markAsVisited = function(url, cardId) {
            let visited = getVisitedJobs();
            if (!visited.includes(url)) {
                visited.push(url);
                localStorage.setItem('visited_jobs', JSON.stringify(visited));
            }

            // Wizualna aktualizacja karty bez odświeżania strony
            const card = document.getElementById(cardId);
            if (card) {
                card.classList.remove('bg-white', 'border-gray-200', 'hover:shadow-md');
                card.classList.add('bg-gray-50', 'border-gray-400', 'opacity-80');

                const btn = card.querySelector('.visit-btn');
                if (btn) {
                    btn.innerHTML = '<i class="fas fa-check mr-1"></i> Odwiedzono';
                    btn.classList.replace('text-blue-600', 'text-gray-500');
                    btn.classList.replace('bg-white', 'bg-gray-100');
                    btn.classList.replace('hover:bg-gray-50', 'hover:bg-gray-200');
                }
            }
        };

        document.getElementById('searchForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = new FormData();
            formData.append('category', document.getElementById('category').value);
            formData.append('location', document.getElementById('location').value);
            formData.append('experience', document.getElementById('experience').value);

            const cvFileInput = document.getElementById('cv_file');
            if (cvFileInput.files.length > 0) {
                formData.append('cv_file', cvFileInput.files[0]);
            }

            const submitBtn = document.getElementById('submitBtn');
            const loadingIndicator = document.getElementById('loadingIndicator');
            const resultsContainer = document.getElementById('resultsContainer');
            const cardsWrapper = document.getElementById('cardsWrapper');

            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-50', 'cursor-not-allowed');
            loadingIndicator.classList.remove('hidden');
            resultsContainer.classList.add('hidden');
            cardsWrapper.innerHTML = '';

            try {
                const response = await fetch('/api/search', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    throw new Error(`Błąd serwera: ${response.status}`);
                }

                const data = await response.json();
                document.getElementById('resultsCount').innerText = `(Znaleziono ${data.total_analyzed} dopasowanych ofert)`;

                // --- POBRANIE HISTORII PRZED RENDEROWANIEM ---
                const visitedJobs = getVisitedJobs();

                data.data.forEach((offer, index) => {
                    const card = document.createElement('div');
                    const cardId = 'offer-card-' + index; // Unikalne ID dla każdej karty
                    card.id = cardId;

                    // --- SPRAWDZENIE STATUSU OFERTY ---
                    const isVisited = visitedJobs.includes(offer.url);

                    // Ustalenie klas CSS w zależności od historii
                    const cardClasses = isVisited
                        ? "bg-gray-50 p-5 rounded-lg shadow-sm border border-gray-400 opacity-80 flex flex-col md:flex-row justify-between items-center gap-4 transition"
                        : "bg-white p-5 rounded-lg shadow-sm border border-gray-200 flex flex-col md:flex-row justify-between items-center gap-4 transition hover:shadow-md";

                    card.className = cardClasses;

                    let scoreBadge = '';
                    if (data.cv_analyzed) {
                        const isHighMatch = offer.match_score >= 45.0;
                        const badgeColor = isHighMatch ? 'bg-green-100 text-green-800 border-green-300' : 'bg-yellow-100 text-yellow-800 border-yellow-300';
                        const icon = isHighMatch ? 'fa-check-circle' : 'fa-chart-bar';

                        scoreBadge = `
                            <div class="mb-3">
                                <span class="inline-flex items-center px-3 py-1 rounded-full text-sm font-bold border ${badgeColor}">
                                    <i class="fas ${icon} mr-1"></i> AI Match: ${offer.match_score}%
                                </span>
                            </div>
                        `;
                    }

                    let stackHtml = "Brak danych";
                    if (offer.tech_stack && offer.tech_stack !== "Not found") {
                        const stackArray = offer.tech_stack.split(',');
                        stackHtml = stackArray.map(tech => {
                            const cleanTech = tech.trim();
                            if (data.cv_analyzed && offer.missing_skills && offer.missing_skills.includes(cleanTech)) {
                                return `<span class="inline-block bg-red-50 text-red-700 border border-red-200 text-xs px-2 py-1 rounded mr-1 mb-1 font-medium" title="Brakuje w CV!"><i class="fas fa-exclamation-triangle mr-1"></i>${cleanTech}</span>`;
                            } else {
                                return `<span class="inline-block bg-gray-100 text-gray-700 border border-gray-200 text-xs px-2 py-1 rounded mr-1 mb-1 font-medium"><i class="fas fa-check text-green-500 mr-1" style="${data.cv_analyzed ? '' : 'display:none'}"></i>${cleanTech}</span>`;
                            }
                        }).join('');
                    }

                    // --- GENEROWANIE PRZYCISKU ZALEŻNIE OD STATUSU ---
                    const buttonHtml = isVisited
                        ? `<a href="${offer.url}" target="_blank" onclick="markAsVisited('${offer.url}', '${cardId}')" class="visit-btn block w-full md:w-auto bg-gray-100 hover:bg-gray-200 text-gray-500 font-semibold py-2 px-6 rounded border border-gray-300 transition duration-150 whitespace-nowrap text-center shadow-sm">
                            <i class="fas fa-check mr-1"></i> Odwiedzono
                           </a>`
                        : `<a href="${offer.url}" target="_blank" onclick="markAsVisited('${offer.url}', '${cardId}')" class="visit-btn block w-full md:w-auto bg-white hover:bg-gray-50 text-blue-600 font-semibold py-2 px-6 rounded border border-gray-300 transition duration-150 whitespace-nowrap text-center shadow-sm">
                            Przejdź do oferty
                           </a>`;

                    card.innerHTML = `
                        <div class="flex-1 w-full min-w-0">
                            <p class="text-xs font-bold text-gray-500 mb-1 tracking-wider uppercase">
                                <i class="fas fa-building mr-1"></i> ${offer.company}
                            </p>
                            <h3 class="text-xl font-bold text-gray-800 mb-2 truncate" title="${offer.title}">
                                ${offer.title}
                            </h3>
                            ${scoreBadge}
                            <div class="flex flex-wrap items-center mt-2">
                                <span class="text-sm font-semibold text-gray-400 mr-3">Wymagania:</span>
                                ${stackHtml}
                            </div>
                        </div>
                        <div class="mt-4 md:mt-0 flex-shrink-0 w-full md:w-auto">
                            ${buttonHtml}
                        </div>
                    `;
                    cardsWrapper.appendChild(card);
                });

                resultsContainer.classList.remove('hidden');

            } catch (error) {
                alert("Wystąpił problem z pobraniem danych.");
                console.error(error);
            } finally {
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                loadingIndicator.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
